spring.application.name=gateway-service
server.port=8081

# H2 in-memory database (name: eventdb)
spring.datasource.url=jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Account service base URL (used by RestClient)
account-service.url=http://localhost:8080

# OpenTelemetry (OTLP) exporter endpoint (optional)
otel.exporter.otlp.endpoint=http://localhost:4317

# Logging: use JSON encoder via logback configuration (logback-spring.xml)
logging.config=classpath:logback-spring.xml

# Swagger UI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha