openapi: 3.1.0
info:
  title: Gateway Service API Contract
  version: 1.0.0
  description: |
    API contract for the Gateway Service. This document defines the public endpoints
    exposed by the Gateway and the contract used when the Gateway calls the Account Service.
servers:
  - url: https://api.example.com
paths:
  /events:
    post:
      summary: Submit a transaction event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventRequest'
      responses:
        '201':
          description: Event created and forwarded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Validation error
        '409':
          description: Duplicate eventId - idempotent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
    get:
      summary: List events for an account
      parameters:
        - name: account
          in: query
          required: true
          schema:
            type: string
          description: Account identifier to list events for
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
      responses:
        '200':
          description: Paginated list of EventResponse ordered by eventTimestamp DESC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfEventResponse'
        '400':
          description: Missing or invalid parameters
  /events/{eventId}:
    get:
      summary: Retrieve a single event by ID
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found

components:
  schemas:
    EventRequest:
      type: object
      required:
        - eventId
        - accountId
        - type
        - amount
        - currency
        - eventTimestamp
      properties:
        eventId:
          type: string
          example: evt-12345
          description: Unique event id generated by producer
        accountId:
          type: string
          example: "123"
          description: Account identifier
        type:
          type: string
          description: Transaction type
          enum: [CREDIT, DEBIT]
          example: CREDIT
        amount:
          type: number
          format: double
          example: 100.50
        currency:
          type: string
          example: USD
        eventTimestamp:
          type: string
          format: date-time
          example: 2026-07-11T10:30:00Z
        metadata:
          type: object
          nullable: true
    EventResponse:
      type: object
      properties:
        eventId:
          type: string
        accountId:
          type: string
        type:
          type: string
          enum: [CREDIT, DEBIT]
        amount:
          type: number
          format: double
        currency:
          type: string
        eventTimestamp:
          type: string
          format: date-time
        metadata:
          type: object
          nullable: true
        status:
          type: string
          enum: [PENDING, APPLIED, PROCESSED, FAILED]
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
    PageOfEventResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EventResponse'
        pageable:
          type: object
        totalElements:
          type: integer
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        size:
          type: integer
        number:
          type: integer
        numberOfElements:
          type: integer
        empty:
          type: boolean

  x-interservice:
    description: |
      Contract for how Gateway calls Account Service to apply a transaction.
    accountService_applyTransaction:
      method: POST
      path: /accounts/{accountId}/transactions
      request:
        contentType: application/json
        schema:
          $ref: '#/components/schemas/TransactionRequest'
      responses:
        '201': Transaction created
        '400': Bad request (validation)
        '503': Service unavailable (circuit-breaker fallback)

    TransactionRequest:
      type: object
      required:
        - amount
        - type
        - currency
      properties:
        amount:
          type: number
          format: double
          description: Signed amount. For DEBIT, Gateway will send negative amounts; for CREDIT positive.
        type:
          type: string
          enum: [CREDIT, DEBIT]
        currency:
          type: string
          example: USD
        description:
          type: string
          nullable: true
          example: "event:evt-12345"
