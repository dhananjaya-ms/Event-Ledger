spring.application.name=account-service

# H2 in-memory database (name: accountdb)
spring.datasource.url=jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator - Enable metrics endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Log metrics in JSON format
logging.level.com.dj.account.metrics=INFO
